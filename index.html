<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Museo — Período Entreguerras</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background-color:#ddd6c8;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(0,0,0,.03) 59px,rgba(0,0,0,.03) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,0,0,.03) 59px,rgba(0,0,0,.03) 60px);
  min-height:100vh;
  font-family:'Cormorant Garamond',serif;
  color:#2c2218;
}

/* ── HEADER ── */
header{
  background:#ede7da;
  border-bottom:1px solid #c4b89e;
  text-align:center;
  padding:56px 24px 48px;
}
.header-tag{
  font-family:'IM Fell English SC',serif;
  font-size:.68rem;
  letter-spacing:6px;
  color:#8a7a5e;
  margin-bottom:16px;
}
header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3.6rem);
  font-weight:700;
  color:#1a1008;
  line-height:1.1;
}
header h1 em{
  display:block;
  font-style:italic;
  font-weight:400;
  font-size:.55em;
  color:#8a7a5e;
  letter-spacing:3px;
  margin-top:8px;
}
.header-rule{
  width:80px;height:1px;
  background:linear-gradient(to right,transparent,#b09060,transparent);
  margin:20px auto 0;
}

/* ── WALL ── */
.wall-label{
  text-align:center;
  font-family:'IM Fell English SC',serif;
  font-size:.65rem;
  letter-spacing:5px;
  color:#8a7a5e;
  padding:48px 0 32px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:72px 80px;
  max-width:960px;
  margin:0 auto;
  padding:0 48px 100px;
}
@media(max-width:680px){
  .gallery{grid-template-columns:1fr;gap:60px;padding:0 28px 60px;}
}

/* ── FRAME CARD ── */
.frame-card{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  cursor:pointer;
  transition:transform .35s ease;
  position:relative;
}
.frame-card:hover{transform:translateY(-8px);}

/* Hook + wire */
.hook{
  width:2px;height:18px;
  background:linear-gradient(to bottom,#aaa,#888);
  margin-bottom:-4px;
  position:relative;
}
.hook::before{
  content:'';
  position:absolute;
  top:-5px;left:50%;
  transform:translateX(-50%);
  width:14px;height:10px;
  background:linear-gradient(135deg,#ccc 0%,#999 50%,#777 100%);
  clip-path:polygon(50% 0%,100% 100%,0% 100%);
}

/* 3D gold frame */
.frame-outer{
  width:100%;
  padding:14px;
  background:linear-gradient(to bottom right,#e8c45a,#c89828 30%,#a07018 50%,#c89828 70%,#f0d070);
  box-shadow:
    inset 3px 3px 0 rgba(255,255,255,.45),
    inset -3px -3px 0 rgba(0,0,0,.35),
    inset 6px 6px 0 rgba(255,255,255,.15),
    inset -6px -6px 0 rgba(0,0,0,.2),
    4px 6px 0 #b8a070,
    6px 10px 0 #a08848,
    8px 18px 24px rgba(0,0,0,.4),
    12px 24px 40px rgba(0,0,0,.18);
}

/* Passepartout */
.frame-mat{
  background:#f0ebe0;
  padding:10px;
  box-shadow:inset 0 2px 10px rgba(0,0,0,.22),inset 0 -1px 4px rgba(0,0,0,.12);
}

/* Photo */
.frame-img{
  display:block;
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  filter:sepia(10%) contrast(1.06) brightness(.97);
  transition:filter .4s ease;
  background:#c8c0b0;
}
.frame-card:hover .frame-img{filter:sepia(0%) contrast(1.04) brightness(1.02);}

/* Fallback cuando no carga la imagen */
.frame-img::after{
  content:attr(alt);
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;height:100%;
  background:#c8c0b0;
  color:#6a5a40;
  font-size:.8rem;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  text-align:center;
  padding:12px;
}

/* Placard */
.placard{
  background:#ede7da;
  border:1px solid #ccc0a0;
  border-top:3px solid #b09060;
  padding:12px 22px 14px;
  text-align:center;
  width:82%;
  box-shadow:0 3px 10px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.08);
}
.placard-no{
  font-family:'IM Fell English SC',serif;
  font-size:.58rem;letter-spacing:4px;color:#a08040;margin-bottom:4px;
}
.placard-title{
  font-family:'Playfair Display',serif;
  font-style:italic;font-size:1rem;color:#1a1008;line-height:1.3;
}
.placard-author{font-size:.75rem;color:#8a7a5e;margin-top:4px;letter-spacing:.5px;}

/* ── LIGHTBOX ── */
.lb-backdrop{
  position:fixed;inset:0;z-index:800;
  background:rgba(8,5,2,0);
  pointer-events:none;
  transition:background .4s ease;
}
.lb-backdrop.open{background:rgba(8,5,2,.88);pointer-events:all;}

.lb-wrap{
  position:fixed;inset:0;z-index:801;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  opacity:0;
  transform:translateY(20px) scale(.97);
  transition:opacity .4s ease,transform .45s cubic-bezier(.22,1,.36,1);
}
.lb-wrap.open{opacity:1;transform:none;pointer-events:all;}

.lb-panel{
  display:flex;
  background:#ede7da;
  max-width:1080px;width:94vw;
  max-height:90vh;
  overflow:hidden;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px #c4b89e;
}

/* Imagen en lightbox */
.lb-left{
  flex:0 0 50%;
  background:#1c1510;
  display:flex;align-items:center;justify-content:center;
  padding:36px;
}
.lb-frame{
  padding:12px;
  background:linear-gradient(135deg,#e8c45a,#c89828 30%,#a07018 50%,#c89828 70%,#f0d070);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.4),
    inset -2px -2px 0 rgba(0,0,0,.35),
    0 8px 28px rgba(0,0,0,.6);
  max-width:100%;
}
.lb-mat{background:#f0ebe0;padding:8px;box-shadow:inset 0 2px 8px rgba(0,0,0,.2);}
.lb-photo{
  display:block;
  max-width:100%;max-height:54vh;
  object-fit:contain;
  filter:sepia(10%) contrast(1.08) brightness(.95);
  background:#c8c0b0;
  min-width:160px;min-height:120px;
}

/* Info */
.lb-right{
  flex:1;overflow-y:auto;
  padding:48px 44px;
  display:flex;flex-direction:column;justify-content:center;
}
.lb-no{font-family:'IM Fell English SC',serif;font-size:.62rem;letter-spacing:5px;color:#a08040;margin-bottom:14px;}
.lb-title{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,2.5vw,1.9rem);font-style:italic;font-weight:400;color:#1a1008;line-height:1.25;margin-bottom:8px;}
.lb-year{font-family:'IM Fell English SC',serif;font-size:.65rem;letter-spacing:3px;color:#8a7a5e;margin-bottom:26px;}
.lb-rule{width:40px;height:1px;background:#b09060;margin-bottom:22px;}
.lb-sec{font-family:'IM Fell English SC',serif;font-size:.58rem;letter-spacing:4px;color:#a08040;margin-bottom:8px;}
.lb-desc{font-size:1rem;line-height:1.85;color:#3c2f1e;font-weight:300;margin-bottom:22px;}
.lb-sec2{font-family:'IM Fell English SC',serif;font-size:.58rem;letter-spacing:4px;color:#a08040;margin-bottom:8px;}
.lb-ctx{font-size:.92rem;line-height:1.9;color:#6a5a3e;font-weight:300;font-style:italic;}

.lb-nav{
  display:flex;gap:10px;
  margin-top:32px;padding-top:22px;
  border-top:1px solid #ccc0a0;
}
.lb-btn{
  flex:1;padding:10px;background:transparent;
  border:1px solid #ccc0a0;color:#8a7a5e;
  font-family:'IM Fell English SC',serif;font-size:.62rem;letter-spacing:3px;
  cursor:pointer;transition:all .25s;
}
.lb-btn:hover{border-color:#b09060;color:#7a5a20;background:#e8deca;}

.lb-close{
  position:fixed;top:20px;right:22px;z-index:802;
  width:36px;height:36px;
  background:#ede7da;border:1px solid #c4b89e;
  color:#5c4c30;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease,background .25s;
  font-family:'Cormorant Garamond',serif;
}
.lb-close.open{opacity:1;pointer-events:all;}
.lb-close:hover{background:#d8d0be;color:#1a0e04;}

@media(max-width:680px){
  .lb-panel{flex-direction:column;max-height:95vh;}
  .lb-left{flex:0 0 auto;padding:20px;}
  .lb-right{padding:24px 20px;}
}

footer{
  background:#d4ccc0;border-top:1px solid #bfb49c;
  text-align:center;padding:26px;
  font-family:'IM Fell English SC',serif;font-size:.65rem;letter-spacing:3px;color:#8a7a5e;
}
</style>
</head>
<body>

<header>
  <div class="header-tag">Colección Permanente &nbsp;·&nbsp; Sala I</div>
  <h1>Período Entreguerras <em>1919 – 1939</em></h1>
  <div class="header-rule"></div>
</header>

<p class="wall-label">— Sala de Exposición —</p>

<div class="gallery" id="gallery"></div>

<footer>Museo Virtual &nbsp;·&nbsp; Cuatro testimonios fotográficos &nbsp;·&nbsp; Siglo XX</footer>

<!-- LIGHTBOX -->
<div class="lb-backdrop" id="lb-back"></div>
<div class="lb-wrap" id="lb-wrap">
  <div class="lb-panel">
    <div class="lb-left">
      <div class="lb-frame"><div class="lb-mat">
        <img class="lb-photo" id="lb-img" src="" alt=""/>
      </div></div>
    </div>
    <div class="lb-right">
      <div class="lb-no" id="lb-no"></div>
      <h2 class="lb-title" id="lb-title"></h2>
      <div class="lb-year" id="lb-year"></div>
      <div class="lb-rule"></div>
      <div class="lb-sec">Descripción de la obra</div>
      <p class="lb-desc" id="lb-desc"></p>
      <div class="lb-sec2">Contexto histórico</div>
      <p class="lb-ctx" id="lb-ctx"></p>
      <div class="lb-nav">
        <button class="lb-btn" id="lb-prev">← Anterior</button>
        <button class="lb-btn" id="lb-next">Siguiente →</button>
      </div>
    </div>
  </div>
</div>
<button class="lb-close" id="lb-close">✕</button>

<script>
const items = [
  {
    title: '"Migrant Mother"',
    year: 'Marzo 1936 · Nipomo, California',
    author: 'Dorothea Lange',
    // Pon aquí el nombre exacto del archivo que subas a la carpeta img/
    img: 'img/migrant-mother.jpg',
    desc: 'La fotografía que se conoce como "Migrant Mother" forma parte de una serie de fotografías que Dorothea Lange tomó de Florence Owens Thompson y sus hijos en marzo de 1936 en Nipomo, California. La imagen se convirtió en el símbolo humano más duradero de la Gran Depresión.',
    ctx: 'El contexto histórico se sitúa durante la Gran Depresión, una grave crisis económica que afectó a Estados Unidos y a gran parte del mundo durante la década de 1930. La crisis comenzó tras el Wall Street Crash de 1929, cuando la bolsa de Nueva York se desplomó y muchas empresas quebraron. Como consecuencia, millones de personas perdieron su empleo y sus ahorros. La pobreza y el desempleo se extendieron por todo el país, especialmente entre los trabajadores agrícolas. Muchas familias tuvieron que emigrar en busca de trabajo temporal en el campo.'
  },
  {
    title: '"El soldado caído"',
    year: 'Septiembre 1936 · Cerro Muriano, Córdoba',
    author: 'Robert Capa',
    img: 'img/soldado-caido.png',
    desc: 'La fotografía conocida como "Muerte de un miliciano" fue tomada por Robert Capa en septiembre de 1936 durante la Guerra Civil Española, cerca de Cerro Muriano, en la provincia de Córdoba. La imagen muestra el momento en que un soldado republicano cae abatido durante el combate. Esta fotografía se convirtió en una de las imágenes más conocidas del fotoperiodismo de guerra del siglo XX.',
    ctx: 'El contexto histórico se sitúa durante la Guerra Civil Española, un conflicto que tuvo lugar entre 1936 y 1939. La guerra comenzó tras un levantamiento militar contra el gobierno de la Segunda República española. El país quedó dividido entre el bando republicano y el bando nacionalista liderado por Francisco Franco. Fue un conflicto muy violento que causó cientos de miles de muertos y grandes destrucciones. Además, varios países europeos apoyaron a los diferentes bandos, por lo que la guerra tuvo una gran dimensión internacional.'
  },
  {
    title: '"Crisis económica en Wall Street"',
    year: 'Octubre 1929 · Nueva York',
    author: 'Associated Press',
    img: 'img/wall-street.png',
    desc: 'La fotografía que muestra a una multitud reunida frente a la Bolsa de Nueva York fue tomada en octubre de 1929 por un autor de la prensa Associated Press, cuando miles de personas se concentraron tras el desplome del mercado de valores. La imagen refleja la preocupación y la incertidumbre de la población ante la caída repentina de la economía.',
    ctx: 'El contexto histórico se relaciona con la crisis económica mundial iniciada tras la caída de la bolsa de Nueva York de 1929. Durante los años veinte la economía estadounidense había crecido rápidamente, pero gran parte de ese crecimiento se basaba en la especulación financiera. Cuando los precios de las acciones comenzaron a caer, muchos inversores vendieron en masa, provocando el colapso de la bolsa. La crisis afectó a bancos, empresas y trabajadores, generando un aumento muy grande del desempleo. Sus consecuencias se extendieron rápidamente a Europa y a otras regiones del mundo. Este periodo de dificultades económicas marcó profundamente la política y la sociedad de la década de 1930.'
  },
  {
    title: '"Concentración de Núremberg de 1936"',
    year: '1936 · Núremberg, Alemania',
    author: 'Archivo nazi',
    img: 'img/nuremberg.png',
    desc: 'La fotografía de las concentraciones del partido nazi en Núremberg fue tomada durante uno de los grandes congresos organizados por el régimen alemán en la década de 1930. En estas reuniones participaban miles de seguidores del partido nazi y se realizaban desfiles, discursos y actos propagandísticos. Las imágenes de estos eventos se difundían ampliamente para mostrar la fuerza y la unidad del régimen.',
    ctx: 'El contexto histórico está relacionado con el ascenso del nazismo en Alemania durante la década de 1930. Tras la crisis económica y la inestabilidad política de la República de Weimar, el partido nazi ganó cada vez más apoyo entre la población. En 1933 Adolf Hitler fue nombrado canciller y estableció un régimen dictatorial basado en el control político, la censura y la propaganda. El gobierno organizaba grandes actos públicos para reforzar su ideología y demostrar su poder.'
  }
];

const gallery = document.getElementById('gallery');

items.forEach((d, i) => {
  const el = document.createElement('div');
  el.className = 'frame-card';
  el.tabIndex = 0;
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', 'Ver obra: ' + d.title);
  el.innerHTML = `
    <div class="hook"></div>
    <div class="frame-outer">
      <div class="frame-mat">
        <img class="frame-img" src="${d.img}" alt="${d.title}" loading="lazy"/>
      </div>
    </div>
    <div class="placard">
      <div class="placard-no">Pieza ${String(i+1).padStart(2,'0')}</div>
      <div class="placard-title">${d.title}</div>
      <div class="placard-author">${d.author}</div>
    </div>
  `;
  el.addEventListener('click', () => openLb(i));
  el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLb(i); });
  gallery.appendChild(el);
});

let cur = 0;
const back    = document.getElementById('lb-back');
const wrap    = document.getElementById('lb-wrap');
const closeBtn= document.getElementById('lb-close');

function fill(i) {
  const d = items[i];
  document.getElementById('lb-img').src   = d.img;
  document.getElementById('lb-img').alt   = d.title;
  document.getElementById('lb-no').textContent    = 'Pieza ' + String(i+1).padStart(2,'0') + ' / ' + items.length;
  document.getElementById('lb-title').textContent = d.title;
  document.getElementById('lb-year').textContent  = d.year;
  document.getElementById('lb-desc').textContent  = d.desc;
  document.getElementById('lb-ctx').textContent   = d.ctx;
}

function openLb(i) {
  cur = i; fill(cur);
  back.classList.add('open');
  wrap.classList.add('open');
  closeBtn.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  back.classList.remove('open');
  wrap.classList.remove('open');
  closeBtn.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeLb);
back.addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', () => { cur = (cur - 1 + items.length) % items.length; fill(cur); });
document.getElementById('lb-next').addEventListener('click', () => { cur = (cur + 1) % items.length; fill(cur); });

document.addEventListener('keydown', e => {
  if (!wrap.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowRight') { cur = (cur + 1) % items.length; fill(cur); }
  if (e.key === 'ArrowLeft')  { cur = (cur - 1 + items.length) % items.length; fill(cur); }
});
</script>
</body>
</html>
